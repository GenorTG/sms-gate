{% extends "base.html" %}
{% block title %}Settings - SMS Gate{% endblock %}
{% block content %}
<div class="card">
  <h1>Settings</h1>
  {% if error %}<p class="message error">{{ error }}</p>{% endif %}
  {% if settings_data %}
  <pre style="background:#f5f5f5;padding:1rem;overflow:auto;">{{ settings_data }}</pre>
  <form method="post" action="{{ url_for('settings_page') }}">
    <input type="hidden" name="action" value="patch">
    <label for="patch_json">PATCH body (JSON)</label>
    <textarea id="patch_json" name="patch_json" placeholder='{"encryption": {}}'></textarea>
    <button type="submit" class="primary">Update</button>
  </form>
  {% else %}
  <p>Set device credentials above to view and edit settings.</p>
  {% endif %}
</div>
{% endblock %}
