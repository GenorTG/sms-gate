{% extends "base.html" %}
{% block title %}Health - SMS Gate{% endblock %}
{% block content %}
<div class="card">
  <h1>Health</h1>
  {% if error %}<p class="message error">{{ error }}</p>{% endif %}
  {% if health_data %}
  <pre style="background:#f5f5f5;padding:1rem;overflow:auto;">{{ health_data }}</pre>
{% elif error %}
  <p class="message error">{{ error }}</p>
{% else %}
  <p>Health status not available.</p>
{% endif %}
</div>
{% endblock %}
